name: secret-scan

# Catches accidentally committed secrets (Stellar S... seed keys, BIP39 phrases,
# .env files, API tokens) before they reach a public branch. Scans full history
# on push/PR; the scheduled run re-checks the whole repo weekly.

# DISABLED until the GITLEAKS_LICENSE key is configured. gitleaks-action@v2
# requires a license for organization-owned repos and fails every run without it.
# To re-enable: add the GITLEAKS_LICENSE repo secret, then uncomment the
# push / pull_request / schedule triggers below (currently manual-only).
on:
  workflow_dispatch:
  # push:
  # pull_request:
  # schedule:
  #   - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, not just the tip
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
