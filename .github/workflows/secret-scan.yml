name: secret-scan

# Catches accidentally committed secrets (Stellar S... seed keys, BIP39 phrases,
# .env files, API tokens) before they reach a public branch. Scans full history
# on push/PR; the scheduled run re-checks the whole repo weekly.

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, not just the tip
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
